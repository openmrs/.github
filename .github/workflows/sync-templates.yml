name: Sync PR templates

on:
  push:
    branches: [main]
    paths:
      - 'templates/**'
      - '.github/template-sync-config.yml'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2

      - uses: BetaHuhn/repo-file-sync-action@8b92be3375cf1d1b0cd579af488a9255572e4619 # v1.21.1
        with:
          GH_PAT: ${{ secrets.OMRS_BOT_GH_TOKEN }}
          CONFIG_PATH: .github/template-sync-config.yml
          SKIP_PR: true
          COMMIT_PREFIX: "(chore) "
          COMMIT_BODY: "Sync repo templates"
